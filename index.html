<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enhanced Dogtags Wiki</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  <style>
    .lang-select { text-align: center; padding: 80px 20px; }
    .lang-select h1 { margin-bottom: 20px; }
    .lang-select p { color: #666; margin-bottom: 40px; }
    .lang-select a { display: inline-block; margin: 8px; padding: 14px 28px; font-size: 1.1em;
      background: #42b983; color: #fff !important; text-decoration: none; border-radius: 6px; }
    .lang-select a:hover { background: #33a372; }
    .app-name a { font-size: 1.5em; font-weight: 600; color: inherit !important; text-decoration: none; }
    .sidebar-lang { padding: 16px; margin-top: auto; margin-bottom: 48px; border-top: 1px solid rgba(0,0,0,.07); }
    .sidebar-lang label { display: block; font-size: 12px; color: #999; margin-bottom: 6px; text-align: center; }
    .sidebar-lang select { width: 100%; padding: 8px 10px; font-size: 13px; border-radius: 4px;
      border: 1px solid #ddd; cursor: pointer; background: #fff; text-align: center; text-align-last: center; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function() {
      var _fetch = window.fetch;
      if (_fetch) {
        window.fetch = function(url, opts) {
          var u = typeof url === 'string' ? url : (url && url.url || '');
          if (u && u.indexOf('_sidebar.md') >= 0) {
            return _fetch.apply(this, arguments).then(function(r) {
              if (r.status === 404) return new Response('* [Home](/kr/Home)', { status: 200, headers: { 'Content-Type': 'text/markdown' } });
              return r;
            }).catch(function() {
              return new Response('* [Home](/kr/Home)', { status: 200, headers: { 'Content-Type': 'text/markdown' } });
            });
          }
          return _fetch.apply(this, arguments);
        };
      }
    })();
    (function() {
      if (window.location.protocol === 'file:') { window._wikiBasePath = ''; return; }
      var p = window.location.pathname || '';
      window._wikiBasePath = (p === '/' || p === '/index.html' || !p) ? '' : (p.replace(/\/index\.html$/i, '').replace(/\/?$/, '') + '/');
    })();
    var CHOOSE_MD = '# <span id="home-title">SH00TM3P1Z\'s Mods</span>\n\n---\n\n<a href="javascript:void(0)" onclick="location.hash=\'#/\'+(typeof getCurrentLang===\'function\'?getCurrentLang():\'kr\')+\'/Home\';return false;" style="display:inline-block;margin:8px;padding:14px 28px;font-size:1.1em;background:#42b983;color:#fff!important;text-decoration:none;border-radius:6px;">EnhancedDogtags</a>';
    window.$docsify = {
      name: "SH00TM3P1Z's Wiki",
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'choose.md',
      basePath: window._wikiBasePath,
      notFoundPage: false,
      routes: {
        '/': CHOOSE_MD,
        '': CHOOSE_MD,
        '/README': CHOOSE_MD,
        '/README.md': CHOOSE_MD,
        '/_404.md': '# 404\n\nPage not found.',
        '/_sidebar.md': '* [Home](/kr/Home)',
        '_sidebar.md': '* [Home](/kr/Home)'
      },
      plugins: [
        function(hook, vm) {
          function injectSidebarUI() {
            var sidebar = document.querySelector('.sidebar') || document.querySelector('aside') || document.querySelector('.app-sidebar');
            if (!sidebar) {
              var nav = document.querySelector('.sidebar-nav');
              if (nav && nav.parentElement) sidebar = nav.parentElement;
            }
            if (!sidebar) return;
            if (!document.getElementById('lang-select')) {
              var nameEl = sidebar.querySelector('.app-name');
              if (!nameEl) {
                var nameDiv = document.createElement('div');
                nameDiv.className = 'app-name';
                nameDiv.innerHTML = '<a href="#/kr/Home">SH00TM3P1Z\'s Wiki</a>';
                sidebar.insertBefore(nameDiv, sidebar.firstChild);
              }
              var div = document.createElement('div');
              div.className = 'sidebar-lang';
              div.innerHTML = '<label id="lang-label">🌐 언어</label><select id="lang-select" onchange="switchLang(this.value)"><option value="">-- 선택 --</option><option value="kr">🇰🇷 한국어</option><option value="en">🇺🇸 English</option><option value="ru">🇷🇺 Русский</option><option value="jp">🇯🇵 日本語</option><option value="zh">🇨🇳 简体中文</option><option value="zhtw">🇹🇼 繁體中文</option><option value="es">🇪🇸 Español</option><option value="de">🇩🇪 Deutsch</option><option value="it">🇮🇹 Italiano</option><option value="fr">🇫🇷 Français</option></select>';
              sidebar.style.display = 'flex';
              sidebar.style.flexDirection = 'column';
              sidebar.appendChild(div);
              setTimeout(syncLangSelect, 50);
            }
          }
          hook.mounted(function() { setTimeout(injectSidebarUI, 100); });
          hook.ready(function() { setTimeout(injectSidebarUI, 150); });
          hook.doneEach(function() {
            setTimeout(injectSidebarUI, 50);
            syncLangSelect();
            [100, 200, 400].forEach(function(ms) { setTimeout(syncLangSelect, ms); });
            var ht = document.getElementById('home-title');
            if (ht && HOME_TITLE) {
              var code = getCurrentLang();
              ht.textContent = HOME_TITLE[code] || HOME_TITLE.en;
            }
            if (window._langSwitchScroll) {
              var pos = sessionStorage.getItem('wikiScrollPos');
              if (pos !== null) {
                setTimeout(function() {
                  window.scrollTo(0, parseInt(pos, 10));
                  sessionStorage.removeItem('wikiScrollPos');
                }, 100);
              }
              window._langSwitchScroll = false;
            }
          });
        }
      ]
    };
    function switchLang(newCode) {
      if (!newCode) return;
      var h = (location.hash || '#/').slice(1);
      if (h === '' || h === '/' || !h.match(/\/[a-z0-9-]+\/.+/)) {
        sessionStorage.setItem('wikiLangPref', newCode);
        var ht = document.getElementById('home-title');
        if (ht && typeof HOME_TITLE !== 'undefined') ht.textContent = HOME_TITLE[newCode] || HOME_TITLE.en;
        syncLangSelect();
        return;
      }
      var m = h.match(/^\/([a-z0-9-]+)\/(.+)$/);
      var path = m ? m[2] : 'Home';
      sessionStorage.setItem('wikiScrollPos', String(window.scrollY));
      window._langSwitchScroll = true;
      location.hash = '#/' + newCode + '/' + path;
    }
    var LANG_UI = {"kr":{"l":"언어","p":"-- 선택 --"},"en":{"l":"Language","p":"-- Select --"},"ru":{"l":"Язык","p":"-- Выбрать --"},"jp":{"l":"言語","p":"-- 選択 --"},"zh":{"l":"语言","p":"-- 选择 --"},"zhtw":{"l":"語言","p":"-- 選擇 --"},"es":{"l":"Idioma","p":"-- Seleccionar --"},"de":{"l":"Sprache","p":"-- Auswählen --"},"it":{"l":"Lingua","p":"-- Seleziona --"},"fr":{"l":"Langue","p":"-- Sélectionner --"}};
    var HOME_TITLE = {kr:"SH00TM3P1Z \uBAA8\uB4DC",en:"SH00TM3P1Z's Mods",ru:"\u041C\u043E\u0434\u044B SH00TM3P1Z",jp:"SH00TM3P1Z\u306EMod",zh:"SH00TM3P1Z\u7684\u6A21\u7EC4",zhtw:"SH00TM3P1Z\u7684\u6A21\u7D44",es:"Mods de SH00TM3P1Z",de:"SH00TM3P1Z's Mods",it:"Mod di SH00TM3P1Z",fr:"Mods de SH00TM3P1Z"};
    function getCurrentLang() {
      var h = location.hash || '';
      var codes = ['kr','en','ru','jp','zhtw','zh','es','de','it','fr'];
      for (var i = 0; i < codes.length; i++) {
        if (h.indexOf('/' + codes[i] + '/') >= 0) return codes[i];
      }
      var pref = sessionStorage.getItem('wikiLangPref');
      if (pref) return pref;
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      return lang.indexOf('ko')>=0?'kr':lang.indexOf('ja')>=0?'jp':(lang.indexOf('zh-tw')>=0||lang.indexOf('zh-hant')>=0)?'zhtw':lang.indexOf('zh')>=0?'zh':lang.indexOf('ru')>=0?'ru':lang.indexOf('es')>=0?'es':lang.indexOf('de')>=0?'de':lang.indexOf('it')>=0?'it':lang.indexOf('fr')>=0?'fr':'kr';
    }
    function syncLangSelect() {
      var sel = document.getElementById('lang-select');
      var lbl = document.getElementById('lang-label');
      var code = getCurrentLang();
      var t = LANG_UI[code] || LANG_UI.kr;
      if (sel) { sel.value = code; if (sel.options[0]) sel.options[0].text = t.p; }
      if (lbl) lbl.textContent = '\uD83C\uDF10 ' + t.l;
    }
    window.addEventListener('hashchange', function() {
      syncLangSelect();
      setTimeout(syncLangSelect, 100);
      setTimeout(syncLangSelect, 300);
    });
    window.addEventListener('load', function() { setTimeout(syncLangSelect, 100); });
  </script>
  <script src="plugins/lang-link.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
